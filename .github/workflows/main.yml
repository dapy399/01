name: Deploy to Alibaba Cloud ECS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: {node-version: '22'}
    - uses: pnpm/action-setup@v3
      with: {version: 9}
    - name: Build frontend
      working-directory: ./project-user
      run: |
        pnpm install --ignore-scripts
        pnpm build
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 121.43.149.193 >> ~/.ssh/known_hosts
    - name: Deploy backend
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 << 'EOF'
          cd /opt/ai-medical-rag && git pull origin main
          cd nest-serve && pnpm install --ignore-scripts && pnpm build
          if pm2 list | grep -q "ai-medical-backend"; then pm2 restart ai-medical-backend; else pm2 start dist/src/main.js --name ai-medical-backend; fi
          pm2 save
          echo "Backend deployed"
        EOF
    - name: Deploy frontend
      run: |
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r project-user/dist/* root@121.43.149.193:/var/www/ai-medical/
    - name: Reload Nginx
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 "sudo nginx -t && sudo systemctl reload nginx && echo 'Deploy complete!'"

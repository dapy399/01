name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Build frontend
      working-directory: ./project-user
      run: |
        pnpm install --ignore-scripts
        pnpm build

    - name: Build backend
      working-directory: ./nest-serve
      run: |
        pnpm install --ignore-scripts
        pnpm build

    - name: Build Wechat Mini Program
      working-directory: ./project-wx
      run: |
        pnpm install
        pnpm weixin

    - name: Verify Wechat Mini Program build output
      working-directory: ./project-wx
      run: |
        if [ ! -d "dist/dev/mp-weixin" ]; then
          echo "Error: 小程序构建产物不存在！"
          exit 1
        fi
        echo "小程序构建产物检查通过"
        echo "文件数量: $(find dist/dev/mp-weixin -type f | wc -l)"
        echo "目录大小: $(du -sh dist/dev/mp-weixin | awk '{print $1}')"

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 121.43.149.193 >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy backend
      run: |
        echo "[1/3] 上传后端代码..."
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 "mkdir -p /opt/ai-medical-rag/nest-serve"
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r nest-serve/* root@121.43.149.193:/opt/ai-medical-rag/nest-serve/

        echo "[2/3] 服务器上安装依赖并编译..."
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 << 'EOF'
          cd /opt/ai-medical-rag/nest-serve
          pnpm install --ignore-scripts
          pnpm build
        EOF

        echo "[3/3] 重启服务..."
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 << 'EOF'
          cd /opt/ai-medical-rag/nest-serve
          if pm2 list | grep -q "ai-medical-backend"; then
            pm2 restart ai-medical-backend
          else
            pm2 start dist/src/main.js --name ai-medical-backend
            pm2 save
          fi
        EOF

    - name: Deploy frontend
      run: |
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r project-user/dist/* root@121.43.149.193:/var/www/ai-medical/

    - name: Deploy Wechat Mini Program
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 "mkdir -p /var/www/ai-medical-wx"
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r project-wx/dist/dev/mp-weixin/* root@121.43.149.193:/var/www/ai-medical-wx/

    - name: Reload Nginx
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 "sudo nginx -t && sudo systemctl reload nginx"
        echo "========================================"
        echo "  部署全部完成！"
        echo "  前端: http://121.43.149.193"
        echo "  小程序: /var/www/ai-medical-wx (微信开发者工具导入)"
        echo "========================================"

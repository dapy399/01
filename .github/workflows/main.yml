name: Deploy to Alibaba Cloud ECS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: {node-version: '22'}
    - uses: pnpm/action-setup@v3
      with: {version: 9}
    - name: Build frontend
      working-directory: ./project-user
      run: |
        pnpm install --ignore-scripts
        pnpm build
    - name: Deploy backend
      uses: appleboy/ssh-action@v1.2.1
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USER }}
        key: ${{ secrets.ECS_PRIVATE_KEY }}
        script: |
          cd /opt/ai-medical-rag && git pull origin main
          cd nest-serve && pnpm install --ignore-scripts && pnpm build
          if pm2 list | grep -q "ai-medical-backend"; then pm2 restart ai-medical-backend; else pm2 start dist/src/main.js --name ai-medical-backend; fi
          pm2 save
          echo "Backend deployed"
    - name: Deploy frontend
      uses: appleboy/scp-action@v0.1.8
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USER }}
        key: ${{ secrets.ECS_PRIVATE_KEY }}
        source: "project-user/dist/*"
        target: "/var/www/ai-medical"
        strip_components: 2
        rm: true
    - name: Reload Nginx
      uses: appleboy/ssh-action@v1.2.1
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USER }}
        key: ${{ secrets.ECS_PRIVATE_KEY }}
        script: sudo nginx -t && sudo systemctl reload nginx && echo "Deploy complete!"

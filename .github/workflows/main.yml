name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Build frontend
      working-directory: ./project-user
      run: |
        pnpm install --ignore-scripts
        pnpm build

    - name: Build Wechat Mini Program
      working-directory: ./project-wx
      run: |
        pnpm install --ignore-scripts
        pnpm build:mp-weixin

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.ECS_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 121.43.149.193 >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy backend
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 << 'EOF'
          set -e
          echo "========================================"
          echo "  开始部署后端"
          echo "========================================"

          BACKEND_DIR="/opt/ai-medical-rag/nest-serve"

          echo "[1/3] 拉取最新代码..."
          cd /opt/ai-medical-rag
          git pull origin main

          echo "[2/3] 安装依赖并编译..."
          cd $BACKEND_DIR
          pnpm install --ignore-scripts
          pnpm build

          echo "[3/3] 重启服务..."
          if pm2 list | grep -q "ai-medical-backend"; then
            pm2 restart ai-medical-backend
            echo "服务已重启"
          else
            pm2 start dist/src/main.js --name ai-medical-backend
            pm2 save
            echo "服务已启动"
          fi

          echo "========================================"
          echo "  后端部署完成！"
          echo "========================================"
        EOF

    - name: Deploy frontend
      run: |
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r project-user/dist/* root@121.43.149.193:/var/www/ai-medical/

    - name: Deploy Wechat Mini Program
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 "mkdir -p /var/www/ai-medical-wx"
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r project-wx/dist/build/mp-weixin/* root@121.43.149.193:/var/www/ai-medical-wx/

    - name: Reload Nginx
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@121.43.149.193 "sudo nginx -t && sudo systemctl reload nginx"
        echo "========================================"
        echo "  部署全部完成！"
        echo "  前端: http://121.43.149.193"
        echo "  小程序: /var/www/ai-medical-wx (微信开发者工具导入)"
        echo "========================================"

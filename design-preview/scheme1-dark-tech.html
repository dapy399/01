<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案一：极简科技暗色</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
  }
  /* 侧边栏 */
  .sidebar {
    width: 260px;
    background: #161b22;
    border-right: 1px solid #30363d;
    padding: 20px;
  }
  .sidebar h3 {
    color: #00d4aa;
    font-size: 14px;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .chat-item {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #8b949e;
    background: #21262d;
    border: 1px solid #30363d;
  }
  .chat-item:hover { background: #30363d; cursor: pointer; }
  .new-chat-btn {
    background: #00d4aa;
    color: #0d1117;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    margin-bottom: 20px;
    cursor: pointer;
    width: 100%;
  }
  /* 主区域 */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .messages {
    flex: 1;
    padding: 40px 20%;
    overflow-y: auto;
  }
  /* AI 消息 */
  .msg-ai {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .avatar-ai {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: #00d4aa;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #0d1117; font-weight: bold;
  }
  .bubble-ai {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 16px;
    max-width: 80%;
    line-height: 1.6;
    font-size: 14px;
    color: #c9d1d9;
  }
  /* 用户消息 */
  .msg-user {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 24px;
  }
  .bubble-user {
    background: rgba(0, 212, 170, 0.15);
    border: 1px solid rgba(0, 212, 170, 0.3);
    border-radius: 12px;
    padding: 12px 16px;
    max-width: 70%;
    font-size: 14px;
    color: #e6edf3;
  }
  /* 输入区 */
  .input-area {
    position: fixed;
    bottom: 30px;
    left: 300px;
    right: 40px;
    background: rgba(22, 27, 34, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .input-tags {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .tag {
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #8b949e;
  }
  .tag.active { border-color: #00d4aa; color: #00d4aa; background: rgba(0,212,170,0.1); }
  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 12px;
  }
  .input-field {
    flex: 1;
    background: transparent;
    border: none;
    color: #e6edf3;
    font-size: 14px;
    outline: none;
    resize: none;
    min-height: 24px;
  }
  .send-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #00d4aa;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .scheme-label {
    position: absolute;
    top: 20px; right: 30px;
    color: #00d4aa;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="sidebar">
    <button class="new-chat-btn">+ 新建对话</button>
    <h3>历史对话</h3>
    <div class="chat-item">头痛和发烧怎么办</div>
    <div class="chat-item">帮我分析体检报告</div>
    <div class="chat-item">感冒药推荐</div>
  </div>
  <div class="main">
    <div class="scheme-label">方案一 · 极简科技暗色</div>
    <div class="messages">
      <div class="msg-ai">
        <div class="avatar-ai">AI</div>
        <div class="bubble-ai">
          您好，我是您的家庭健康助手。有任何医疗健康问题都可以向我咨询，我会结合医学知识库为您提供专业建议。
        </div>
      </div>
      <div class="msg-user">
        <div class="bubble-user">我最近总是头痛，还有点发烧</div>
      </div>
      <div class="msg-ai">
        <div class="avatar-ai">AI</div>
        <div class="bubble-ai">
          了解您的症状。头痛伴随发烧可能由多种原因引起，如感冒、流感或其他感染。建议您：<br><br>
          1. 多休息，保持充足睡眠<br>
          2. 多喝水，避免脱水<br>
          3. 监测体温变化<br><br>
          如果症状持续或加重，请及时就医。
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-tags">
        <span class="tag active">知识库问答</span>
        <span class="tag">联网搜索</span>
        <span class="tag">上传报告</span>
      </div>
      <div class="input-box">
        <textarea class="input-field" rows="1" placeholder="任何健康问题都可以问我..."></textarea>
        <button class="send-btn">▶</button>
      </div>
    </div>
  </div>
</body>
</html>
